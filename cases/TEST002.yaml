fluid:
  working_fluid: air
boundary_conditions:
  Pt_in: 200000.0
  Tt_in: 400.0
  Ps_out: 101325.0
geometry:
  x_start: 0.0
  x_end: 0.1
  n_cells: 100
  area_distribution:
    type: table
    x:
    - 0.0
    - 0.05
    - 0.1
    A:
    - 0.0001
    - 6.0e-05
    - 5.0e-05
droplet_injection:
  droplet_velocity_in: 10.0
  droplet_diameter_mean_in: 5.0e-05
  droplet_diameter_max_in: 0.0001
models:
  breakup_model: weber_critical
  critical_weber_number: 12.0
  breakup_factor_mean: 0.5
  breakup_factor_max: 0.5
outputs:
  output_directory: outputs
  write_csv: true
  write_json: true
  generate_plots: true
