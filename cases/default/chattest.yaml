fluid:
  working_fluid: air
boundary_conditions:
  Pt_in: 200000.0
  Tt_in: 300.0
  Ps_out: 101325.0
geometry:
  x_start: 0.0
  x_end: 0.5
  num_cells: 100
  area_table:
  - x: 0.0
    A: 0.01
  - x: 0.25
    A: 0.005
  - x: 0.5
    A: 0.01
droplet_injection:
  droplet_velocity_in: 10.0
  droplet_diameter_mean_in: 5.0e-05
  droplet_diameter_max_in: 0.0001
model_selection:
  breakup_model: weber_critical
  critical_weber_number: 12.0
  breakup_factor_mean: 0.5
  breakup_factor_max: 0.5
  drag_model: standard_sphere
  coupling_mode: one_way
outputs:
  output_dir: outputs
  write_csv: true
  write_json: true
  generate_plots: true
